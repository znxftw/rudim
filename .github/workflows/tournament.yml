name: Tournament

on:
  workflow_dispatch:

jobs:
  tournament:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          submodules: true

      - name: Setup Rust toolchain (rustup)
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version
          cargo --version

      - name: Build Latest Rudim (Rust)
        run: cargo build --release

      - name: Download Stable Rudim
        run: |
          mkdir -p stable-rudim
          wget https://github.com/znxftw/rudim/releases/latest/download/linux-x64.zip
          unzip -o linux-x64.zip -d stable-rudim
          chmod +x stable-rudim/Rudim

      - name: Download Fastchess and Openings
        run: |
          # Download and setup fastchess
          wget https://github.com/Disservin/fastchess/releases/download/v1.8.0-alpha/fastchess-linux-x86-64.tar
          tar -xvf fastchess-linux-x86-64.tar
          chmod +x fastchess-linux-x86-64

          # Download and extract openings book
          wget https://github.com/official-stockfish/books/raw/master/8moves_v3.pgn.zip
          unzip 8moves_v3.pgn.zip

      - name: Run Tournaments
        run: |
          ./fastchess-linux-x86-64/fastchess \
            -engine cmd=./target/release/rudim name="Current Rudim" \
            -engine cmd=./stable-rudim/Rudim name="Stable Rudim" \
            -games 250 -each tc=10+0.1 -concurrency 4 \
            -openings file=8moves_v3.pgn order=random format=pgn
