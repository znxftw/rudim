name: publish
run-name: "Generate binaries for ${{ inputs.commit }}"
on:
  workflow_dispatch:
    inputs:
      commit:
        description: "Commit id to generate binaries for"
        required: true

jobs:
  linux-x64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit }}
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Publish
        working-directory: Rudim
        run: dotnet publish -c Release -p:PublishProfile=FolderProfile
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: Rudim/bin/Release/net9.0/publish/

  windows-x64:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit }}
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Publish
        working-directory: Rudim
        run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o bin/Release/net9.0/publish/
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: Rudim/bin/Release/net9.0/publish/

  osx-x64:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit }}
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Publish
        working-directory: Rudim
        run: dotnet publish -c Release -r osx-x64 --self-contained true -p:PublishSingleFile=true -o bin/Release/net9.0/publish/
      - uses: actions/upload-artifact@v4
        with:
          name: osx-x64
          path: Rudim/bin/Release/net9.0/publish/

  osx-arm64:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit }}
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Publish
        working-directory: Rudim
        run: dotnet publish -c Release -r osx-arm64 --self-contained true -p:PublishSingleFile=true -o bin/Release/net9.0/publish/
      - uses: actions/upload-artifact@v4
        with:
          name: osx-arm64
          path: Rudim/bin/Release/net9.0/publish/

