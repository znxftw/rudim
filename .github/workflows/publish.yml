name: Publish

on:
  workflow_dispatch:

jobs:
  build-binaries:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_path: target/x86_64-unknown-linux-gnu/release/rudim
            asset_name: linux-x64
            output_name: Rudim
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_path: target/x86_64-pc-windows-msvc/release/rudim.exe
            asset_name: windows-x64
            output_name: Rudim.exe
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            binary_path: target/aarch64-pc-windows-msvc/release/rudim.exe
            asset_name: windows-arm64
            output_name: Rudim.exe
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary_path: target/aarch64-unknown-linux-gnu/release/rudim
            asset_name: linux-arm64
            output_name: Rudim
          - os: macos-26-intel
            target: x86_64-apple-darwin
            binary_path: target/x86_64-apple-darwin/release/rudim
            asset_name: osx-x64
            output_name: Rudim
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_path: target/aarch64-apple-darwin/release/rudim
            asset_name: osx-arm64
            output_name: Rudim

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain (rustup)
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.target }}
          rustc --version
          cargo --version

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Stage binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp ${{ matrix.binary_path }} dist/${{ matrix.output_name }}
          chmod +x dist/${{ matrix.output_name }}

      - name: Stage binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "${{ matrix.binary_path }}" "dist/${{ matrix.output_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.output_name }}
